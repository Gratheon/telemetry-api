version: '3'

services:
  telemetry-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm ci && npm run build && node /app/app/telemetry-api.js"
    environment:
      - PORT=8600
      - ENV_ID=test
      - NODE_ENV=test
      - TEST_AUTH_BYPASS_ENABLED=true
      - USER_CYCLE_GRAPHQL_URL=http://localhost:4000/graphql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=test
      - DB_PASSWORD=test
      - DB_NAME=telemetry-api
    ports:
      - 8600:8600
    volumes:
      - .:/app/
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: postgres
    ports:
      - 5308:5432
    volumes:
      - postgres-test-data:/var/lib/postgresql
      - ./test/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d telemetry-api"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-test-data:
