name: Test

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
  # Allow manual triggering
  workflow_dispatch:
  # Make this workflow callable from other workflows
  workflow_call:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run unit tests
      run: npm run test:unit

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./test-results/unit-coverage/lcov.info
        flags: unit
        fail_ci_if_error: true
        verbose: true

  integration-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Build Docker image
      run: docker compose -f docker-compose.test.yml build

    - name: Start API server
      run: docker compose -f docker-compose.test.yml up -d

    - name: Run integration tests
      run: |
        mkdir -p test-results
        API_HOST=localhost CI=true npm run test:integration
    
    - name: Save test logs
      if: always()
      run: |
        docker compose -f docker-compose.test.yml logs > test-results/docker-logs.txt
    
    - name: Upload test results
      if: always()  # Run even if the previous step fails
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: test-results/
        retention-days: 7
    
    - name: Clean up
      if: always()  # Run even if the previous steps fail
      run: |
        docker compose -f docker-compose.test.yml down -v
        docker system prune -f
