name: Test

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
  # Allow manual triggering
  workflow_dispatch:
  # Make this workflow callable from other workflows
  workflow_call:

jobs:
  go-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Run Go tests
      run: go test ./...

  integration-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Build Docker image
      run: docker compose -f docker-compose.test.yml build

    - name: Start API server
      run: docker compose -f docker-compose.test.yml up -d

    - name: Run integration tests
      run: |
        mkdir -p test-results
        TEST_DB_DSN="host=localhost port=5308 user=test password=test dbname=telemetry-api sslmode=disable" go test -run TestPostgresStoreRoundTrip ./...
    
    - name: Save test logs
      if: always()
      run: |
        docker compose -f docker-compose.test.yml logs > test-results/docker-logs.txt
    
    - name: Upload test results
      if: always()  # Run even if the previous step fails
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: test-results/
        retention-days: 7
    
    - name: Clean up
      if: always()  # Run even if the previous steps fail
      run: |
        docker compose -f docker-compose.test.yml down -v
        docker system prune -f
